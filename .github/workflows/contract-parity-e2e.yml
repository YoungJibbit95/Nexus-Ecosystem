name: Contract Parity E2E

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  contract-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Nexus Main deps
        run: npm --prefix "./Nexus Main" ci

      - name: Install Nexus Mobile deps
        run: npm --prefix "./Nexus Mobile" ci

      - name: Install Nexus Code deps
        run: npm --prefix "./Nexus Code" ci

      - name: Install Nexus Code Mobile deps
        run: npm --prefix "./Nexus Code Mobile" ci

      - name: Verify contracts and security
        run: npm run verify:ecosystem

      - name: Build Main
        run: npm --prefix "./Nexus Main" run build

      - name: Build Mobile
        run: npm --prefix "./Nexus Mobile" run build

      - name: Build Code
        run: npm --prefix "./Nexus Code" run build

      - name: Build Code Mobile
        run: npm --prefix "./Nexus Code Mobile" run build

      - name: Hosted API smoke
        shell: bash
        env:
          NEXUS_CONTROL_URL: ${{ vars.NEXUS_CONTROL_URL || 'https://nexus-api.dev' }}
        run: |
          set -euo pipefail
          echo "Smoke target: ${NEXUS_CONTROL_URL}"
          curl -fsS "${NEXUS_CONTROL_URL}/health" >/tmp/nexus-health-ci.json
          curl -fsS "${NEXUS_CONTROL_URL}/api/v1/public/bootstrap" >/tmp/nexus-bootstrap-ci.json
