name: Contract Parity E2E

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  contract-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Install Nexus Core deps
        run: npm --prefix "./packages/nexus-core" ci

      - name: Install Nexus Main deps
        run: npm --prefix "./Nexus Main" ci

      - name: Install Nexus Mobile deps
        run: npm --prefix "./Nexus Mobile" ci

      - name: Install Nexus Code deps
        run: npm --prefix "./Nexus Code" ci

      - name: Install Nexus Code Mobile deps
        run: npm --prefix "./Nexus Code Mobile" ci

      - name: Verify contracts and security
        run: npm run verify:ecosystem

      - name: Build Main
        run: npm --prefix "./Nexus Main" run build

      - name: Build Mobile
        run: npm --prefix "./Nexus Mobile" run build

      - name: Build Code
        run: npm --prefix "./Nexus Code" run build

      - name: Build Code Mobile
        run: npm --prefix "./Nexus Code Mobile" run build

      - name: Public surface guard
        run: |
          npm run check:no-private-strings
          npm run check:secrets
