name: Build Electron Installers

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build-installers:
    name: "${{ matrix.app_name }} (${{ matrix.target }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            app_name: "Nexus Main"
            app_slug: "nexus-main"
            app_dir: "Nexus Main"
            target: "mac"
            npm_script: "electron:build:mac"
          - os: windows-latest
            app_name: "Nexus Main"
            app_slug: "nexus-main"
            app_dir: "Nexus Main"
            target: "win"
            npm_script: "electron:build:win"
          - os: macos-latest
            app_name: "Nexus Code"
            app_slug: "nexus-code"
            app_dir: "Nexus Code"
            target: "mac"
            npm_script: "electron:build:mac"
          - os: windows-latest
            app_name: "Nexus Code"
            app_slug: "nexus-code"
            app_dir: "Nexus Code"
            target: "win"
            npm_script: "electron:build:win"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "${{ matrix.app_dir }}/package-lock.json"

      - name: Install dependencies
        working-directory: "${{ matrix.app_dir }}"
        run: npm ci

      - name: Build installer
        working-directory: "${{ matrix.app_dir }}"
        run: npm run ${{ matrix.npm_script }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.app_slug }}-${{ matrix.target }}-installers"
          retention-days: 14
          if-no-files-found: error
          path: |
            ${{ matrix.app_dir }}/release/**/*.dmg
            ${{ matrix.app_dir }}/release/**/*.pkg
            ${{ matrix.app_dir }}/release/**/*.zip
            ${{ matrix.app_dir }}/release/**/*.exe
            ${{ matrix.app_dir }}/release/**/*.msi
