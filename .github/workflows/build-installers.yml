name: Build Electron Installers

on:
  workflow_dispatch:
    inputs:
      signing_required:
        description: "Fail if platform signing secrets are missing"
        required: false
        type: boolean
        default: false
      notarize_macos:
        description: "Submit macOS DMGs to Apple notarytool"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: build-installers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-installers:
    name: "${{ matrix.app_name }} (${{ matrix.target }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            app_name: "Nexus Main"
            app_slug: "nexus-main"
            app_dir: "Nexus Main"
            target: "mac"
            npm_script: "electron:build:mac"
          - os: windows-latest
            app_name: "Nexus Main"
            app_slug: "nexus-main"
            app_dir: "Nexus Main"
            target: "win"
            npm_script: "electron:build:win"
          - os: ubuntu-latest
            app_name: "Nexus Main"
            app_slug: "nexus-main"
            app_dir: "Nexus Main"
            target: "linux"
            npm_script: "electron:build:linux"
          - os: macos-latest
            app_name: "Nexus Code"
            app_slug: "nexus-code"
            app_dir: "Nexus Code"
            target: "mac"
            npm_script: "electron:build:mac"
          - os: windows-latest
            app_name: "Nexus Code"
            app_slug: "nexus-code"
            app_dir: "Nexus Code"
            target: "win"
            npm_script: "electron:build:win"
          - os: ubuntu-latest
            app_name: "Nexus Code"
            app_slug: "nexus-code"
            app_dir: "Nexus Code"
            target: "linux"
            npm_script: "electron:build:linux"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: "${{ matrix.app_dir }}/package-lock.json"

      - name: Install dependencies
        working-directory: "${{ matrix.app_dir }}"
        run: npm ci

      - name: Verify signing configuration
        env:
          NEXUS_SIGNING_TARGET: "${{ matrix.target }}"
          NEXUS_SIGNING_REQUIRED: "${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || inputs.signing_required }}"
          NEXUS_MAC_NOTARIZE: "${{ matrix.target == 'mac' && (github.event_name == 'release' || inputs.notarize_macos) }}"
          MAC_CSC_LINK: "${{ secrets.MAC_CSC_LINK }}"
          MAC_CSC_KEY_PASSWORD: "${{ secrets.MAC_CSC_KEY_PASSWORD }}"
          WIN_CSC_LINK: "${{ secrets.WIN_CSC_LINK }}"
          WIN_CSC_KEY_PASSWORD: "${{ secrets.WIN_CSC_KEY_PASSWORD }}"
          APPLE_ID: "${{ secrets.APPLE_ID }}"
          APPLE_APP_SPECIFIC_PASSWORD: "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
          APPLE_TEAM_ID: "${{ secrets.APPLE_TEAM_ID }}"
          NEXUS_INSTALLER_CHECKSUM_SIGNING_KEY_PEM: "${{ secrets.NEXUS_INSTALLER_CHECKSUM_SIGNING_KEY_PEM }}"
          NEXUS_INSTALLER_CHECKSUM_SIGNING_KEY_BASE64: "${{ secrets.NEXUS_INSTALLER_CHECKSUM_SIGNING_KEY_BASE64 }}"
          NEXUS_INSTALLER_CHECKSUM_SIGNING_KEY_ID: "${{ vars.NEXUS_INSTALLER_CHECKSUM_SIGNING_KEY_ID }}"
          NEXUS_LAUNCHER_FEED_SIGNING_KEY_PEM: "${{ secrets.NEXUS_LAUNCHER_FEED_SIGNING_KEY_PEM }}"
          NEXUS_LAUNCHER_FEED_SIGNING_KEY_BASE64: "${{ secrets.NEXUS_LAUNCHER_FEED_SIGNING_KEY_BASE64 }}"
          NEXUS_LAUNCHER_FEED_SIGNING_KEY_ID: "${{ vars.NEXUS_LAUNCHER_FEED_SIGNING_KEY_ID }}"
        run: node ./tools/verify-signing-env.mjs --target=${{ matrix.target }}

      - name: Build installer
        working-directory: "${{ matrix.app_dir }}"
        env:
          NEXUS_SIGNING_REQUIRED: "${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || inputs.signing_required }}"
          NEXUS_MAC_NOTARIZE: "${{ matrix.target == 'mac' && (github.event_name == 'release' || inputs.notarize_macos) }}"
          CSC_LINK: "${{ matrix.target == 'mac' && secrets.MAC_CSC_LINK || matrix.target == 'win' && secrets.WIN_CSC_LINK || '' }}"
          CSC_KEY_PASSWORD: "${{ matrix.target == 'mac' && secrets.MAC_CSC_KEY_PASSWORD || matrix.target == 'win' && secrets.WIN_CSC_KEY_PASSWORD || '' }}"
          APPLE_ID: "${{ secrets.APPLE_ID }}"
          APPLE_APP_SPECIFIC_PASSWORD: "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
          APPLE_TEAM_ID: "${{ secrets.APPLE_TEAM_ID }}"
        run: npm run ${{ matrix.npm_script }}

      - name: Generate checksums
        env:
          NEXUS_INSTALLER_CHECKSUM_SIGNATURE_REQUIRED: "${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || inputs.signing_required }}"
          NEXUS_INSTALLER_CHECKSUM_SIGNING_KEY_PEM: "${{ secrets.NEXUS_INSTALLER_CHECKSUM_SIGNING_KEY_PEM }}"
          NEXUS_INSTALLER_CHECKSUM_SIGNING_KEY_BASE64: "${{ secrets.NEXUS_INSTALLER_CHECKSUM_SIGNING_KEY_BASE64 }}"
          NEXUS_INSTALLER_CHECKSUM_SIGNING_KEY_ID: "${{ vars.NEXUS_INSTALLER_CHECKSUM_SIGNING_KEY_ID }}"
          NEXUS_LAUNCHER_FEED_SIGNING_KEY_PEM: "${{ secrets.NEXUS_LAUNCHER_FEED_SIGNING_KEY_PEM }}"
          NEXUS_LAUNCHER_FEED_SIGNING_KEY_BASE64: "${{ secrets.NEXUS_LAUNCHER_FEED_SIGNING_KEY_BASE64 }}"
          NEXUS_LAUNCHER_FEED_SIGNING_KEY_ID: "${{ vars.NEXUS_LAUNCHER_FEED_SIGNING_KEY_ID }}"
        run: node ./tools/generate-installer-checksums.mjs --dir "${{ matrix.app_dir }}/release"

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.app_slug }}-${{ matrix.target }}-installers"
          retention-days: 14
          if-no-files-found: error
          path: |
            ${{ matrix.app_dir }}/release/**/*.dmg
            ${{ matrix.app_dir }}/release/**/*.pkg
            ${{ matrix.app_dir }}/release/**/*.zip
            ${{ matrix.app_dir }}/release/**/*.exe
            ${{ matrix.app_dir }}/release/**/*.msi
            ${{ matrix.app_dir }}/release/**/*.AppImage
            ${{ matrix.app_dir }}/release/**/*.deb
            ${{ matrix.app_dir }}/release/**/SHA256SUMS.txt
            ${{ matrix.app_dir }}/release/**/SHA256SUMS.txt.sig
            ${{ matrix.app_dir }}/release/**/SHA256SUMS.metadata.json

      - name: Attach installers to GitHub Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ github.event.release.tag_name || github.ref_name }}"
          fail_on_unmatched_files: true
          files: |
            ${{ matrix.app_dir }}/release/**/*.dmg
            ${{ matrix.app_dir }}/release/**/*.pkg
            ${{ matrix.app_dir }}/release/**/*.zip
            ${{ matrix.app_dir }}/release/**/*.exe
            ${{ matrix.app_dir }}/release/**/*.msi
            ${{ matrix.app_dir }}/release/**/*.AppImage
            ${{ matrix.app_dir }}/release/**/*.deb
            ${{ matrix.app_dir }}/release/**/SHA256SUMS.txt
            ${{ matrix.app_dir }}/release/**/SHA256SUMS.txt.sig
            ${{ matrix.app_dir }}/release/**/SHA256SUMS.metadata.json
