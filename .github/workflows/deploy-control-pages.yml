name: Deploy Nexus Control (GitHub Pages)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Nexus Control/**"
      - ".github/workflows/deploy-control-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: nexus-control-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXUS_CONTROL_UI_BOOTSTRAP_PATH: /api/v1/public/bootstrap
      NEXUS_CONTROL_PRIVATE_REPO_HINT: YoungJibbit95/NexusAPI
      NEXUS_CONTROL_UI_FORCE_API_URL: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "Nexus Control/package-lock.json"

      - name: Resolve runtime API URL
        run: |
          API_URL="${{ vars.NEXUS_CONTROL_PUBLIC_API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="hhttps://youngjibbit95.github.io/Nexus-Ecosystem/"
            echo "::warning::Repository Variable NEXUS_CONTROL_PUBLIC_API_URL fehlt. Fallback auf $API_URL (UI bleibt editierbar)."
            echo "NEXUS_CONTROL_UI_FORCE_API_URL=false" >> "$GITHUB_ENV"
          else
            echo "NEXUS_CONTROL_UI_FORCE_API_URL=true" >> "$GITHUB_ENV"
          fi
          echo "NEXUS_CONTROL_UI_DEFAULT_API_URL=$API_URL" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm --prefix "./Nexus Control" ci

      - name: Build Nexus Control for Pages
        run: npm --prefix "./Nexus Control" run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "Nexus Control/dist"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
