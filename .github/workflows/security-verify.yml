name: Security Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-ecosystem:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Ecosystem Contracts/Security
        run: npm run verify:ecosystem
