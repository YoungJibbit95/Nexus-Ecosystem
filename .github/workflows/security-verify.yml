name: Security Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-ecosystem:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Check public surface
        run: |
          npm run check:no-private-strings
          npm run check:secrets

      - name: Verify Ecosystem Contracts/Security
        run: npm run verify:ecosystem
