version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:10"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      tooling:
        patterns:
          - "@types/node"
          - "typescript"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
      workspace-tooling:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "tsx"
          - "eslint*"

  - package-ecosystem: "npm"
    directory: "/Nexus Main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:35"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      react-stack:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      electron-stack:
        patterns:
          - "electron"
          - "electron-builder"
      docs-ui:
        patterns:
          - "lucide-react"
          - "framer-motion"
          - "three"
          - "react-markdown"
      tooling:
        patterns:
          - "@types/node"
          - "typescript"
          - "vite"
          - "@vitejs/*"

  - package-ecosystem: "npm"
    directory: "/Nexus Mobile"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:40"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      react-stack:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      capacitor-stack:
        patterns:
          - "@capacitor/*"
      docs-ui:
        patterns:
          - "lucide-react"
          - "framer-motion"
          - "three"
          - "react-markdown"
      tooling:
        patterns:
          - "@types/node"
          - "typescript"
          - "vite"
          - "@vitejs/*"

  - package-ecosystem: "npm"
    directory: "/Nexus Code"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:45"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      react-stack:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      electron-stack:
        patterns:
          - "electron"
          - "electron-builder"
      editor-stack:
        patterns:
          - "monaco-editor"
          - "@monaco-editor/*"
      tooling:
        patterns:
          - "@types/node"
          - "typescript"
          - "vite"
          - "@vitejs/*"

  - package-ecosystem: "npm"
    directory: "/Nexus Code Mobile"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:50"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      react-stack:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      capacitor-stack:
        patterns:
          - "@capacitor/*"
      editor-stack:
        patterns:
          - "monaco-editor"
          - "@monaco-editor/*"
      tooling:
        patterns:
          - "@types/node"
          - "typescript"
          - "vite"
          - "@vitejs/*"

  - package-ecosystem: "npm"
    directory: "/Nexus Wiki"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:55"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      react-stack:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      docs-ui:
        patterns:
          - "lucide-react"
          - "framer-motion"
          - "three"
      tooling:
        patterns:
          - "@types/node"
          - "typescript"
          - "vite"
          - "@vitejs/*"

  - package-ecosystem: "npm"
    directory: "/packages/nexus-core"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      core-runtime:
        patterns:
          - "*"
